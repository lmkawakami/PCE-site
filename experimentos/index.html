<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Ceramics Experiments</title>
    <meta name="description" content="Site protegido por senha." />
    <link rel="stylesheet" href="/assets/style.css" />
    <link rel="stylesheet" href="/assets/protected-site.css" />
    <script>
      window.PROTECTED_SITE_ROUTE = "/experimentos/";
    </script>
    <script defer src="/assets/protected-site.js"></script>
  </head>
  <body class="protected-shell">
    <header class="protected-shell__header">
      <a class="protected-shell__brand" href="/">Private Ceramics Experiments</a>
      <nav class="protected-shell__nav">
        <a href="/">Início</a>
        <a href="/experimentos/">Experimentos</a>
        <a href="/fontes/">Fontes</a>
        <a href="/materiais/">Materiais</a>
        <a href="/metodos/">Métodos</a>
        <a href="/glossario/">Glossário</a>
        <a href="/sobre/">Sobre</a>
      </nav>
    </header>
    <main class="site-main protected-shell__main" id="protected-app">
      <section class="protected-card">
        <h1>Acesso protegido</h1>
        <p>Digite a senha para abrir este conteúdo.</p>
        <form id="protected-form" class="protected-form">
          <label for="protected-passphrase">Senha</label>
          <input id="protected-passphrase" name="passphrase" type="password" autocomplete="current-password" />
          <button type="submit">Desbloquear</button>
        </form>
        <p id="protected-message" class="protected-message" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
